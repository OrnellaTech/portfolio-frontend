<section class="home d-flex" id="home">
    <div class="mono-background container-a"></div>

    <div class="container-fluid mt-5 pt-5 pb-4">
        <div class="row align-items-center">
            <!-- Photo de profil (à gauche sur desktop, en dessous sur mobile) -->
            <div class="col-12 col-md-5 home-photo text-center order-2 order-md-1 mb-4 mb-md-0">
                <img [src]="introduction.photo_Intro" alt="Photo de profil" class="img-fluid profile-img">
            </div>

            <!-- Texte et boutons (à droite sur desktop, au-dessus sur mobile) -->
            <div class="col-12 col-md-6 introduction text-center text-md-left order-1 order-md-2">
                <p class="welcome_text mb-4 mt-4" data-aos="fade-up" data-aos-duration="1200" data-aos-delay="150">
                    I'm a <span class="welcome-text-type" [attr.data-options]="introduction.titles.join(', ')"
                     [attr.data-titles]="introduction.titles.join('|')">
                   
                </span>
                </p>
                <div id="parallax-scene" class="mb-4" data-aos="fade-up" data-aos-duration="1200" data-aos-delay="300">
                    <div class="heading-zone">
                        <h1>{{ introduction.fullName }}</h1>
                    </div>
                </div>
                <div class="d-flex flex-column flex-md-row" data-aos="fade-up" data-aos-duration="1200" data-aos-delay="450">
                    <a href="#portfolio" class="mb-3 mb-md-0">
                        <button>Voir mes projets</button>
                    </a>
                    <a href="#contact">
                        <button>Me contacter</button>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scroll Down -->
    <div class="scroll-down mt-5 pt-3 d-none d-sm-block">
        <a href="#about" class="scroll-down-link text-center hoveroff">
            <div class="scroll-title">Scroll Down</div>
            <div class="scroll-mouse">
                <div class="whell"></div>
            </div>
        </a>
    </div>
</section>
