<section id="about" class="about about-section py-5">


  <!-- Intro -->
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8 text-center mb-4">
        <h3 class="mb-3">{{ about.greeting }}</h3>
        <p class="mb-4 intro-text">
          {{ about.intro }}
        </p>
      </div>
    </div>
  </div>

  <!-- Contenu principal -->
  <div class="container">
    <div class="row align-items-center g-5">

      <!-- Texte -->
      <div class="col-12 col-lg-6 about-text">

        <div class="about-table table-responsive mb-4" *ngIf="about.skills.length || about.contacts.length">

          <!-- <pre>{{ about | json }}</pre> -->
          <table class="table table-borderless align-middle">
            <tbody>
              <tr *ngFor="let skill of about.skills">
                <th>{{ skill.label }}</th>
                <td>{{ skill.value }}</td>
              </tr>
              <tr *ngFor="let contact of about.contacts">
                <th>{{ contact.label }}</th>
                <td>{{ contact.value }}</td>
              </tr>

            </tbody>
          </table>
        </div>

      </div>

      <!-- Image -->
      <div class="col-12 col-lg-6 mb-3 about-visual text-center justify-content-center">
        <img [src]="about.image" alt="About Me" class="img-fluid rounded mb-3">
        <div class="button-and-social flex-column  align-items-center gap-3">
          <a [href]="about.cvUrl" class="btn btn-outline-primary btn-lg">Download CV</a>
          <ul class="social-icons list-inline m-0">
            <li class="list-inline-item" *ngFor="let social of about.socials">
              <a [href]="social.url" target="_blank">
                <i [class]="social.icon"></i>
              </a>
            </li>

          </ul>
        </div>

      </div>

    </div>
  </div>

  <!-- Slider technologies -->
  <div class="slider-tech mt-5 py-3">
    <div class="slider" style="--width:65px; --height:65px; --quantity:12;">
      <div class="list">
        <div class="item" *ngFor="let tech of about.technologies; let i = index" [style.--position]="i + 1">

          <div class="card">
            <img *ngIf="tech.type === 'img'" [src]="tech.icon" [alt]="tech.alt" />

            <!-- SVG inline -->
            <span *ngIf="tech.type === 'svg'" class="svg-icon" [innerHTML]="sanitizeSvg(tech.icon)">
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
