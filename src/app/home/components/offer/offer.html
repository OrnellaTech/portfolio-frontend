  <section class="services" id="service">
            <div class="container d-flex flex-column justify-content-between h-100 ">

                <div class="section-title flex-grow-1">
                    <div class="row">
                        <div class="col-lg-12">
                            <div class="text-center">
                                <h2 data-aos="heading-show" class="text_background">
                                    What I Do
                                    <span class="heading_background">Services</span>
                                </h2>
                                <p class="m-0">{{ offer.intro }}</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="section-content flex-grow-1">
                    <div class="row">
                        <div class="col-lg-4 col-md-6 mt-4 mb-2 d-flex" *ngFor="let item of offer.item">
                            <div class="service-single text-left p-5">
                                <!-- <div class="service-icon">
                                    <span class="mbri-database"></span>
                                </div> -->
                                <h3 class="my-3">{{ item.nom }}</h3>
                                <p>{{ item.detail }}</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
