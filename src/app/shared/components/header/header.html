<!-- shared/components/header/header.html -->
<header class="navigation horizontal_header transparentOnScroll navbar navbar-expand-lg fixed-top">
    <div class="header-ins">
        <div class="container">
            <!-- LOGO AREA - Dynamique avec prénom + nom -->
            <div class="site-logo">
                <a href="#" class="hoveroff" title="">
                    {{ firstName }}<span>{{ lastName }}</span>
                </a>
            </div>
            
            <button class="button-toggler navbar-toggler collapsed" 
                    type="button" 
                    data-target="#navigation" 
                    data-toggle="collapse" 
                    aria-controls="navigation" 
                    aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <!-- Main Navigation START -->
            <ul class="justify-content-end scrollspy collapse navbar-collapse" id="navigation">
                <li>
                    <a href="#home" class="nav-link">Home</a>
                </li>
                <li>
                    <a href="#about" class="nav-link">About</a>
                </li>
                <li>
                    <a href="#service" class="nav-link">Services</a>
                </li>
                <li>
                    <a href="#portfolio" class="nav-link">Portfolio</a>
                </li>
                <li>
                    <a href="#contact" class="nav-link">Contact</a>
                </li>
              <!-- header.html -->
<li class="dropdown" [class.show]="dropdownOpen">
    <a href="#" class="nav-link"
       (click)="toggleDropdown(); $event.preventDefault()">
      Changer d'utilisateur
    </a>
    <div class="dropdown-menu">
          <a href="" class="dropdown-item"
          >
            Ornella Tech (Default User)
        </a>

        <a *ngFor="let user of users" 
           class="dropdown-item" href="#"
           (click)="switchUser(user.id); dropdownOpen = false; $event.preventDefault()">
            {{ user.prenom }} {{ user.nom }}
        </a>
      
    </div>
</li>
            </ul>
            <!-- Main Navigation END -->
        </div>
    </div>
</header>
